services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER:     bloguser
      POSTGRES_PASSWORD: blogpass
      POSTGRES_DB:       blogdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloguser -d blogdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      # Override DB_HOST to point at the db container (not localhost)
      DB_HOST:     db
      DB_PORT:     5432
      DB_USER:     bloguser
      DB_PASSWORD: blogpass
      DB_NAME:     blogdb

volumes:
  pgdata:
