<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post</title>
  <meta name="description" content="" />
  <meta property="og:type" content="article" />
  <meta property="og:site_name" content="Brendan's Blog" />
  <meta property="og:title" content="" />
  <meta property="og:description" content="" />
  <meta property="og:image" content="" />
  <meta property="og:url" content="" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="" />
  <meta name="twitter:description" content="" />
  <meta name="twitter:image" content="" />
  <link rel="canonical" href="" />
  <script type="application/ld+json" id="ld-json">{}</script>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="site-title" href="/">Brendan's Blog</a>
      <nav>
        <a href="/">Home</a>
        <a href="/games.html">Games</a>
        <a href="/admin.html" id="nav-admin" style="display:none">Admin</a>
        <a href="/login.html" id="nav-login">Login</a>
      </nav>
      <button id="theme-toggle" title="Toggle dark mode">🌙</button>
    </div>
  </header>
  <script>
    (function() {
      const saved = localStorage.getItem("theme");
      if (saved) document.documentElement.setAttribute("data-theme", saved);
      else if (window.matchMedia("(prefers-color-scheme: dark)").matches)
        document.documentElement.setAttribute("data-theme", "dark");
    })();
  </script>

  <main class="container">
    <div id="loading">Loading…</div>
    <article id="post-container" style="display:none">
      <div class="post-header">
        <h1 id="post-title"></h1>
        <div class="meta">
          <span id="post-date"></span>
          <span id="post-tags" style="margin-left:0.75rem"></span>
        </div>
      </div>
      <div class="post-body" id="post-body"></div>
      <div style="margin-top:2rem">
        <a href="/" class="btn btn-secondary">← Back to posts</a>
      </div>
    </article>
    <div id="not-found" style="display:none" class="empty-state">Post not found.</div>
  </main>

  <!-- marked.js for Markdown rendering (pinned to stable v4) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="/lightbox.js"></script>
  <script>
    marked.use({
      renderer: {
        code(code, lang) {
          const language = lang && hljs.getLanguage(lang) ? lang : 'plaintext';
          const highlighted = hljs.highlight(code, { language }).value;
          return `<pre><code class="hljs language-${language}">${highlighted}</code></pre>`;
        }
      },
      walkTokens(token) {
        if (token.type === 'code' && token.lang === 'cards') {
          token.type = 'html';
          token.text = `<div class="card-hand-placeholder">${token.text.trim()}</div>`;
        }
      }
    });
  </script>
  <script>
    const API = "/api";

    function escHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    function formatDate(iso) {
      return new Date(iso).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
    }

    async function load() {
      const slug = location.pathname.startsWith("/posts/")
        ? decodeURIComponent(location.pathname.slice("/posts/".length))
        : new URLSearchParams(location.search).get("slug");
      if (!slug) { showNotFound(); return; }

      const token = localStorage.getItem("authToken");
      const res = await fetch(`${API}/posts/${slug}`, token ? { headers: { "Authorization": "Bearer " + token } } : {});
      document.getElementById("loading").style.display = "none";

      if (!res.ok) { showNotFound(); return; }

      const post = await res.json();
      document.title = post.title + " — Brendan's Blog";

      // Noindex
      if (post.noindex) {
        const meta = document.createElement("meta");
        meta.name = "robots"; meta.content = "noindex, nofollow";
        document.head.appendChild(meta);
      }

      // SEO meta tags
      const desc = post.excerpt || "";
      const canonical = window.location.origin + "/posts/" + post.slug;
      const ogImage = post.card_image ? window.location.origin + post.card_image : "";
      document.querySelector("meta[name='description']").setAttribute("content", desc);
      document.querySelector("meta[property='og:title']").setAttribute("content", post.title + " — Brendan's Blog");
      document.querySelector("meta[property='og:description']").setAttribute("content", desc);
      document.querySelector("meta[property='og:url']").setAttribute("content", canonical);
      document.querySelector("meta[property='og:image']").setAttribute("content", ogImage);
      document.querySelector("link[rel='canonical']").setAttribute("href", canonical);
      // Twitter Card
      document.querySelector("meta[name='twitter:title']").setAttribute("content", post.title + " — Brendan's Blog");
      document.querySelector("meta[name='twitter:description']").setAttribute("content", desc);
      document.querySelector("meta[name='twitter:image']").setAttribute("content", ogImage);
      // JSON-LD Article schema
      document.getElementById("ld-json").textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "BlogPosting",
        "headline": post.title,
        "description": desc,
        "image": ogImage || undefined,
        "datePublished": post.created_at,
        "dateModified": post.updated_at || post.created_at,
        "url": canonical,
        "author": { "@type": "Person", "name": post.author_username || "Brendan" },
        "publisher": { "@type": "Organization", "name": "Brendan's Blog", "url": window.location.origin }
      });

      document.getElementById("post-title").textContent = post.title;
      document.getElementById("post-date").textContent = formatDate(post.created_at);
      document.getElementById("post-tags").innerHTML = post.tags
        .map(t => `<a href="/?tag=${t.slug}" class="tag">${escHtml(t.name)}</a>`)
        .join(" ");

      // Render markdown
      const postBody = document.getElementById("post-body");
      try {
        postBody.innerHTML = DOMPurify.sanitize(marked.parse(post.content || ""));
      } catch (e) {
        postBody.textContent = post.content || "";
      }

      // Images in the same paragraph (consecutive lines, no blank line) → flex row
      postBody.querySelectorAll("p").forEach(p => {
        const nodes = [...p.childNodes].filter(n => !(n.nodeType === Node.TEXT_NODE && !n.textContent.trim()));
        if (nodes.length > 1 && nodes.every(n => n.nodeName === "IMG")) p.classList.add("img-row");
      });
      // Consecutive single-image paragraphs (blank line between them) → flex row
      const isSingleImageP = p => {
        const nodes = [...p.childNodes].filter(n => !(n.nodeType === Node.TEXT_NODE && !n.textContent.trim()));
        return nodes.length === 1 && nodes[0].nodeName === "IMG";
      };
      const allP = [...postBody.querySelectorAll("p")];
      let i = 0;
      while (i < allP.length) {
        if (isSingleImageP(allP[i])) {
          let j = i + 1;
          while (j < allP.length && isSingleImageP(allP[j]) && allP[j].previousElementSibling === allP[j - 1]) j++;
          if (j > i + 1) {
            const row = document.createElement("div");
            row.className = "img-row";
            allP[i].parentNode.insertBefore(row, allP[i]);
            for (let k = i; k < j; k++) {
              row.appendChild(allP[k].firstElementChild);
              allP[k].remove();
            }
          }
          i = j;
        } else {
          i++;
        }
      }

      // Render card hand placeholders inserted by the marked "cards" code fence renderer
      const SUITS = { S: "♠", H: "♥", D: "♦", C: "♣" };
      const RED_SUITS = new Set(["H", "D"]);
      function makeCardHand(codesStr) {
        const hand = document.createElement("div");
        hand.className = "card-hand";
        codesStr.trim().split(/\s+/).forEach(code => {
          code = code.toUpperCase();
          const suit = code.slice(-1), rank = code.slice(0, -1);
          if (!SUITS[suit] || !["A","2","3","4","5","6","7","8","9","T","J","Q","K"].includes(rank)) return;
          const el = document.createElement("div");
          el.className = "playing-card" + (RED_SUITS.has(suit) ? " red" : "");
          el.innerHTML = `<span class="card-rank">${rank}</span><span class="card-suit">${SUITS[suit]}</span>`;
          hand.appendChild(el);
        });
        return hand;
      }
      postBody.querySelectorAll(".card-hand-placeholder").forEach(el => {
        el.replaceWith(makeCardHand(el.textContent));
      });

      // Wire up lightbox — click any image to open full-size in the lightbox
      postBody.querySelectorAll("img").forEach(img => {
        const filename = decodeURIComponent(img.src.split("/").pop().split("?")[0]);
        const fullSrc  = `/api/images/proxy/images/${encodeURIComponent(filename)}`;
        img.style.cursor = "zoom-in";
        img.addEventListener("click", () => openLightbox(fullSrc, img.alt || filename));
      });

      document.getElementById("post-container").style.display = "block";

      // Increment hit counters (fire-and-forget)
      fetch(`${API}/posts/${post.id}/hit`, { method: "POST" });
      fetch(`${API}/stats/hit`, { method: "POST" });
    }

    function showNotFound() {
      document.getElementById("loading").style.display = "none";
      document.getElementById("not-found").style.display = "block";
    }

    if (localStorage.getItem("authToken")) {
      document.getElementById("nav-admin").style.display = "";
      document.getElementById("nav-login").style.display = "none";
    }

    load();

    // Theme toggle
    const btn = document.getElementById("theme-toggle");
    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      btn.textContent = theme === "dark" ? "☀️" : "🌙";
      localStorage.setItem("theme", theme);
    }
    const current = document.documentElement.getAttribute("data-theme") || "light";
    btn.textContent = current === "dark" ? "☀️" : "🌙";
    btn.addEventListener("click", () => {
      applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
    });
  </script>
</body>
</html>
