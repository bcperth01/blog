<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Four in a Row — Brendan's Blog</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      padding: 1.5rem 0 3rem;
    }

    .game-status {
      font-size: 1.15rem;
      font-weight: 600;
      min-height: 1.6em;
      color: var(--text);
    }

    .game-status .disc-icon {
      display: inline-block;
      width: 0.95em;
      height: 0.95em;
      border-radius: 50%;
      vertical-align: middle;
      margin-right: 0.3em;
      position: relative;
      top: -0.05em;
    }

    /* Column hover targets sit above the board */
    .board-area {
      position: relative;
      user-select: none;
    }

    .col-hover-row {
      display: flex;
      gap: 6px;
      margin-bottom: 4px;
    }

    .col-hover-cell {
      width: 68px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.4rem;
      color: #e04040;
      opacity: 0.25;
      transition: opacity 0.15s, transform 0.15s;
      line-height: 1;
      user-select: none;
    }

    .col-hover-cell:hover {
      opacity: 1;
      transform: translateY(3px);
    }

    .board-area.game-over .col-hover-cell {
      cursor: default;
      opacity: 0.1;
    }

    .board-area.game-over .col-hover-cell:hover {
      opacity: 0.1;
      transform: none;
    }

    .board-area.game-over .board-col-overlay {
      pointer-events: none;
    }

    /* Invisible column overlays on the board for click-anywhere-in-column */
    .board-col-overlay {
      position: absolute;
      top: 0;
      width: calc((100% - 16px) / 7);
      height: 100%;
      cursor: pointer;
      z-index: 1;
    }
    .board-col-overlay:hover ~ .board .col-highlight-0 { opacity: 0.08; }
    .board-col-overlay.hovered { background: rgba(255,255,255,0.06); border-radius: 4px; }

    /* The board itself */
    .board {
      background: #1a6fd4;
      border-radius: 10px;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(7, 68px);
      grid-template-rows: repeat(6, 68px);
      gap: 6px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    }

    .cell {
      border-radius: 50%;
      background: var(--bg, #f0f4f8);
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.25);
      transition: background 0.12s;
    }

    .cell.red  { background: #e04040; box-shadow: inset 0 3px 8px rgba(0,0,0,0.2), 0 0 8px rgba(224,64,64,0.35); }
    .cell.yellow { background: #f5c518; box-shadow: inset 0 3px 8px rgba(0,0,0,0.2), 0 0 8px rgba(245,197,24,0.35); }

    /* CPU last move flash */
    .cell.yellow.cpu-last {
      animation: flash-cpu 0.25s ease-in-out 3 alternate;
    }
    @keyframes flash-cpu {
      from { background: #f5c518; box-shadow: inset 0 3px 8px rgba(0,0,0,0.2), 0 0 6px rgba(245,197,24,0.4); }
      to   { background: #fff5a0; box-shadow: inset 0 3px 8px rgba(0,0,0,0.1), 0 0 32px 8px rgba(255,230,80,1); }
    }

    /* Winning cells pulse */
    .cell.red.win-cell {
      animation: pulse-red 0.5s ease-in-out infinite alternate;
    }
    .cell.yellow.win-cell {
      animation: pulse-yellow 0.5s ease-in-out infinite alternate;
    }

    @keyframes pulse-red {
      from { background: #e04040; box-shadow: inset 0 3px 8px rgba(0,0,0,0.2), 0 0 6px rgba(224,64,64,0.4); }
      to   { background: #ff7070; box-shadow: inset 0 3px 8px rgba(0,0,0,0.1), 0 0 28px 6px rgba(255,80,80,1); }
    }
    @keyframes pulse-yellow {
      from { background: #f5c518; box-shadow: inset 0 3px 8px rgba(0,0,0,0.2), 0 0 6px rgba(245,197,24,0.4); }
      to   { background: #ffe55a; box-shadow: inset 0 3px 8px rgba(0,0,0,0.1), 0 0 28px 6px rgba(255,220,40,1); }
    }

    [data-theme="dark"] .cell {
      background: #1e2235;
    }

    .game-controls {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .difficulty-label {
      font-size: 0.88rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .difficulty-label select {
      font-size: 0.88rem;
      padding: 0.2rem 0.5rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
    }

    @media (max-width: 560px) {
      .board {
        grid-template-columns: repeat(7, 44px);
        grid-template-rows: repeat(6, 44px);
        gap: 4px;
        padding: 5px;
      }
      .col-hover-row { gap: 4px; }
      .col-hover-cell { width: 44px; height: 28px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="site-title" href="/">Brendan's Blog</a>
      <nav>
        <a href="/">Home</a>
        <a href="/games.html" class="active">Games</a>
        <a href="/admin.html" id="nav-admin" style="display:none">Admin</a>
        <a href="/login.html" id="nav-login">Login</a>
      </nav>
      <button id="theme-toggle" title="Toggle dark mode">🌙</button>
    </div>
  </header>

  <main class="container">
    <h1 class="page-title">Four in a Row</h1>
    <div class="game-wrapper">
      <div class="game-status" id="status"></div>

      <div class="board-area" id="board-area">
        <!-- Column hover targets -->
        <div class="col-hover-row" id="hover-row"></div>
        <!-- Grid cells -->
        <div class="board" id="board"></div>
      </div>

      <div class="game-controls">
        <button class="btn btn-primary" id="new-game-btn">New Game</button>
        <label class="difficulty-label">
          Difficulty:
          <select id="difficulty">
            <option value="2">Easy</option>
            <option value="4" selected>Medium</option>
            <option value="6">Hard</option>
          </select>
        </label>
      </div>
    </div>
  </main>

  <script>
    // ─── Theme ───────────────────────────────────────────────
    (function() {
      const saved = localStorage.getItem("theme");
      if (saved) document.documentElement.setAttribute("data-theme", saved);
      else if (window.matchMedia("(prefers-color-scheme: dark)").matches)
        document.documentElement.setAttribute("data-theme", "dark");
    })();
    const themeBtn = document.getElementById("theme-toggle");
    themeBtn.textContent = (document.documentElement.getAttribute("data-theme") || "light") === "dark" ? "☀️" : "🌙";
    themeBtn.addEventListener("click", () => {
      const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
      themeBtn.textContent = next === "dark" ? "☀️" : "🌙";
    });
    if (localStorage.getItem("authToken")) {
      document.getElementById("nav-admin").style.display = "";
      document.getElementById("nav-login").style.display = "none";
    }

    // ─── Game Constants ───────────────────────────────────────
    const ROWS = 6, COLS = 7;
    const HUMAN = 1, CPU = 2;
    const WIN_LENGTH = 4;

    // ─── State ────────────────────────────────────────────────
    let board, currentPlayer, gameOver, cpuThinking;

    function emptyBoard() {
      return Array.from({ length: ROWS }, () => new Array(COLS).fill(0));
    }

    function initGame() {
      board = emptyBoard();
      currentPlayer = HUMAN;
      gameOver = false;
      cpuThinking = false;
      renderBoard();
      setStatus("your-turn");
      document.getElementById("board-area").classList.remove("game-over");
    }

    // ─── Rendering ────────────────────────────────────────────
    function renderBoard(winCells, lastMove) {
      const boardEl = document.getElementById("board");
      boardEl.innerHTML = "";
      const winSet = winCells ? new Set(winCells.map(([r, c]) => r * COLS + c)) : new Set();
      const lastKey = lastMove ? lastMove[0] * COLS + lastMove[1] : -1;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          const v = board[r][c];
          if (v === HUMAN)  { cell.classList.add("red"); }
          if (v === CPU)    { cell.classList.add("yellow"); }
          if (winSet.has(r * COLS + c)) cell.classList.add("win-cell");
          if (r * COLS + c === lastKey) cell.classList.add("cpu-last");
          boardEl.appendChild(cell);
        }
      }

      // Arrow row above board
      const hoverRow = document.getElementById("hover-row");
      hoverRow.innerHTML = "";
      for (let c = 0; c < COLS; c++) {
        const hc = document.createElement("div");
        hc.className = "col-hover-cell";
        hc.dataset.col = c;
        hc.textContent = "▼";
        hc.title = `Drop in column ${c + 1}`;
        hc.addEventListener("click", () => humanMove(c));
        // Highlight matching arrow when hovering anywhere in the column overlay
        hc.addEventListener("mouseenter", () => hc.style.opacity = "1");
        hc.addEventListener("mouseleave", () => hc.style.opacity = "");
        hoverRow.appendChild(hc);
      }

      // Invisible column overlays on the board so clicking anywhere in a column works
      const boardArea = document.getElementById("board-area");
      boardArea.querySelectorAll(".board-col-overlay").forEach(el => el.remove());
      const boardRect = boardEl.getBoundingClientRect();
      // Use CSS to position overlays; build them as siblings of the board
      const colWidth = (boardEl.offsetWidth - 16) / 7; // padding 8px each side
      for (let c = 0; c < COLS; c++) {
        const ov = document.createElement("div");
        ov.className = "board-col-overlay";
        ov.style.cssText = `left:${8 + c * (colWidth + 6)}px; width:${colWidth}px; top:${hoverRow.offsetHeight + 4}px; height:${boardEl.offsetHeight}px;`;
        ov.addEventListener("click", () => humanMove(c));
        ov.addEventListener("mouseenter", () => {
          hoverRow.children[c].style.opacity = "1";
          hoverRow.children[c].style.transform = "translateY(3px)";
        });
        ov.addEventListener("mouseleave", () => {
          hoverRow.children[c].style.opacity = "";
          hoverRow.children[c].style.transform = "";
        });
        boardArea.appendChild(ov);
      }
    }

    function setStatus(type, winner) {
      const el = document.getElementById("status");
      if (type === "your-turn") {
        el.innerHTML = `<span class="disc-icon" style="background:#e04040"></span>Your turn`;
      } else if (type === "cpu-turn") {
        el.innerHTML = `<span class="disc-icon" style="background:#f5c518"></span>Computer is thinking…`;
      } else if (type === "win") {
        if (winner === HUMAN) {
          el.innerHTML = `<span class="disc-icon" style="background:#e04040"></span>You win! 🎉`;
        } else {
          el.innerHTML = `<span class="disc-icon" style="background:#f5c518"></span>Computer wins!`;
        }
      } else if (type === "draw") {
        el.textContent = "It's a draw!";
      }
    }

    // ─── Game Logic ───────────────────────────────────────────
    function dropRow(b, col) {
      for (let r = ROWS - 1; r >= 0; r--) {
        if (b[r][col] === 0) return r;
      }
      return -1; // column full
    }

    function checkWin(b, player) {
      // Returns array of winning [r,c] pairs or null
      const dirs = [[0,1],[1,0],[1,1],[1,-1]];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (b[r][c] !== player) continue;
          for (const [dr, dc] of dirs) {
            const cells = [[r, c]];
            for (let k = 1; k < WIN_LENGTH; k++) {
              const nr = r + dr*k, nc = c + dc*k;
              if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS || b[nr][nc] !== player) break;
              cells.push([nr, nc]);
            }
            if (cells.length === WIN_LENGTH) return cells;
          }
        }
      }
      return null;
    }

    function isBoardFull(b) {
      return b[0].every(v => v !== 0);
    }

    function humanMove(col) {
      if (gameOver || cpuThinking || currentPlayer !== HUMAN) return;
      const row = dropRow(board, col);
      if (row === -1) return; // full column

      board[row][col] = HUMAN;
      const winCells = checkWin(board, HUMAN);
      if (winCells) {
        renderBoard(winCells);
        setStatus("win", HUMAN);
        gameOver = true;
        document.getElementById("board-area").classList.add("game-over");
        return;
      }
      if (isBoardFull(board)) {
        renderBoard();
        setStatus("draw");
        gameOver = true;
        document.getElementById("board-area").classList.add("game-over");
        return;
      }
      currentPlayer = CPU;
      renderBoard();
      setStatus("cpu-turn");
      cpuThinking = true;
      setTimeout(doCpuMove, 350);
    }

    function doCpuMove() {
      const depth = parseInt(document.getElementById("difficulty").value, 10);
      const col = bestMove(board, depth);
      const row = dropRow(board, col);
      board[row][col] = CPU;
      const winCells = checkWin(board, CPU);
      cpuThinking = false;
      if (winCells) {
        renderBoard(winCells, [row, col]);
        setStatus("win", CPU);
        gameOver = true;
        document.getElementById("board-area").classList.add("game-over");
        return;
      }
      if (isBoardFull(board)) {
        renderBoard(null, [row, col]);
        setStatus("draw");
        gameOver = true;
        document.getElementById("board-area").classList.add("game-over");
        return;
      }
      currentPlayer = HUMAN;
      renderBoard(null, [row, col]);
      setStatus("your-turn");
    }

    // ─── Minimax AI ───────────────────────────────────────────
    // Column search order: prefer centre
    const COL_ORDER = [3, 2, 4, 1, 5, 0, 6];

    function scoreWindow(window, player) {
      const opp = player === CPU ? HUMAN : CPU;
      const p = window.filter(v => v === player).length;
      const o = window.filter(v => v === opp).length;
      const e = window.filter(v => v === 0).length;
      if (p === 4) return 100;
      if (p === 3 && e === 1) return 5;
      if (p === 2 && e === 2) return 2;
      if (o === 3 && e === 1) return -4;
      return 0;
    }

    function scoreBoard(b, player) {
      let score = 0;
      // Centre column preference
      const centre = b.map(r => r[3]);
      score += centre.filter(v => v === player).length * 3;
      // Horizontal
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c <= COLS - WIN_LENGTH; c++)
          score += scoreWindow([b[r][c], b[r][c+1], b[r][c+2], b[r][c+3]], player);
      // Vertical
      for (let c = 0; c < COLS; c++)
        for (let r = 0; r <= ROWS - WIN_LENGTH; r++)
          score += scoreWindow([b[r][c], b[r+1][c], b[r+2][c], b[r+3][c]], player);
      // Diag down-right
      for (let r = 0; r <= ROWS - WIN_LENGTH; r++)
        for (let c = 0; c <= COLS - WIN_LENGTH; c++)
          score += scoreWindow([b[r][c], b[r+1][c+1], b[r+2][c+2], b[r+3][c+3]], player);
      // Diag down-left
      for (let r = 0; r <= ROWS - WIN_LENGTH; r++)
        for (let c = WIN_LENGTH - 1; c < COLS; c++)
          score += scoreWindow([b[r][c], b[r+1][c-1], b[r+2][c-2], b[r+3][c-3]], player);
      return score;
    }

    function isTerminal(b) {
      return checkWin(b, HUMAN) || checkWin(b, CPU) || isBoardFull(b);
    }

    function validCols(b) {
      return COL_ORDER.filter(c => b[0][c] === 0);
    }

    function cloneBoard(b) {
      return b.map(r => r.slice());
    }

    function minimax(b, depth, alpha, beta, maximising) {
      const terminal = isTerminal(b);
      if (depth === 0 || terminal) {
        if (terminal) {
          if (checkWin(b, CPU))   return  1_000_000;
          if (checkWin(b, HUMAN)) return -1_000_000;
          return 0; // draw
        }
        return scoreBoard(b, CPU);
      }
      const cols = validCols(b);
      if (maximising) {
        let best = -Infinity;
        for (const col of cols) {
          const nb = cloneBoard(b);
          const row = dropRow(nb, col);
          nb[row][col] = CPU;
          const score = minimax(nb, depth - 1, alpha, beta, false);
          if (score > best) best = score;
          if (best > alpha) alpha = best;
          if (alpha >= beta) break;
        }
        return best;
      } else {
        let best = Infinity;
        for (const col of cols) {
          const nb = cloneBoard(b);
          const row = dropRow(nb, col);
          nb[row][col] = HUMAN;
          const score = minimax(nb, depth - 1, alpha, beta, true);
          if (score < best) best = score;
          if (best < beta) beta = best;
          if (alpha >= beta) break;
        }
        return best;
      }
    }

    function bestMove(b, depth) {
      let bestScore = -Infinity;
      let bestCol = validCols(b)[0];
      for (const col of validCols(b)) {
        const nb = cloneBoard(b);
        const row = dropRow(nb, col);
        nb[row][col] = CPU;
        const score = minimax(nb, depth - 1, -Infinity, Infinity, false);
        if (score > bestScore) { bestScore = score; bestCol = col; }
      }
      return bestCol;
    }

    // ─── Boot ─────────────────────────────────────────────────
    document.getElementById("new-game-btn").addEventListener("click", initGame);
    initGame();
  </script>
</body>
</html>
