name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Clone repo on first deploy, otherwise pull latest
            if [ ! -d "$HOME/app" ]; then
              git clone https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }} $HOME/app
            fi

            cd $HOME/app
            git pull https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }} main

            # Write .env from GitHub secrets
            cat > .env <<'ENVEOF'
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            AWS_S3_IMAGES_PREFIX=${{ secrets.AWS_S3_IMAGES_PREFIX }}
            AWS_S3_THUMBNAILS_PREFIX=${{ secrets.AWS_S3_THUMBNAILS_PREFIX }}
            AWS_S3_CARDS_PREFIX=${{ secrets.AWS_S3_CARDS_PREFIX }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            PORT=3000
            NODE_ENV=production
            ENVEOF

            # Install buildx system-wide so it works for all users including root
            sudo mkdir -p /usr/local/lib/docker/cli-plugins
            sudo curl -SL https://github.com/docker/buildx/releases/download/v0.19.3/buildx-v0.19.3.linux-amd64 -o /usr/local/lib/docker/cli-plugins/docker-buildx
            sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx

            # Rebuild and restart containers
            sudo docker compose pull db
            sudo docker compose up -d --build

            # Run DB migrations (idempotent — safe to re-run on every deploy)
            for f in $HOME/app/migrations/*.sql; do
              [ -f "$f" ] && sudo docker compose exec -T db psql -U bloguser -d blogdb < "$f" || true
            done

            # Install and configure fail2ban (idempotent)
            if ! systemctl is-active --quiet fail2ban; then
              sudo dnf install -y fail2ban
              printf '[DEFAULT]\nbantime  = 1h\nfindtime = 10m\nmaxretry = 5\nbackend  = systemd\n\n[sshd]\nenabled = true\n' | sudo tee /etc/fail2ban/jail.local > /dev/null
              sudo systemctl enable fail2ban
              sudo systemctl start fail2ban
            fi

            # Install AWS CLI and set up daily backup cron
            sudo dnf install -y awscli
            cp $HOME/app/scripts/backup.sh $HOME/backup.sh
            chmod +x $HOME/backup.sh
            (crontab -l 2>/dev/null | grep -v "backup.sh"; echo "0 2 * * * $HOME/backup.sh >> $HOME/backup.log 2>&1") | crontab -

            # Ensure Nginx is installed and running
            sudo dnf install -y nginx certbot python3-certbot-nginx
            sudo systemctl enable nginx

            # Only copy base config if no cert exists yet (certbot manages it after first run)
            if [ ! -f /etc/letsencrypt/live/blog.bcperth.com/fullchain.pem ]; then
              sudo cp $HOME/app/nginx/blog.conf /etc/nginx/conf.d/blog.conf
              sudo nginx -t && sudo systemctl reload nginx || sudo systemctl start nginx
              # Obtain SSL certificate
              sudo certbot --nginx \
                --non-interactive \
                --agree-tos \
                --email ${{ secrets.ADMIN_EMAIL }} \
                --domains blog.bcperth.com \
                --redirect || true
            else
              # Cert exists — just reload nginx to pick up any app changes
              sudo nginx -t && sudo systemctl reload nginx
            fi
